<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1">
	<title>RSABOX · Montador de Personagem</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" integrity="sha384-DCY3M8xLkMu6c9IKcKbe+jHKMjelnwC0p+SBaxfHxoBYZWdJF2X400UdBCgATtAB" crossorigin="anonymous">
	<link rel="stylesheet" href="styles/loading.css">
	<link rel="stylesheet" href="styles/main.css">
	<link rel="stylesheet" href="styles/components/tree/recolors.css">
	<link rel="stylesheet" href="styles/rsabox-theme.css">
	<script src="https://unpkg.com/mithril@2.3.8/mithril.min.js" integrity="sha384-nlmjDO01tRRK0qMLxgrQdR3687yMuLHdKdwTkxa7feXSksjRmsaqG6Pv1DmNzAjb" crossorigin="anonymous"></script>
	<script src="https://unpkg.com/classnames@2.5.1/index.js" integrity="sha384-yZ5lBIhc/erbKN+W+yrRuYTNoM3dwd0Rg2eKYqVq2bf2sUrgZxtUaaBbSscxnjRp" crossorigin="anonymous"></script>
	<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
	<script type="text/javascript" src="item-metadata.js?v=1.00.0001"></script>
	<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/tinygesture@3.0.0/+esm" integrity="sha384-slQqJEEJRY2lwI6FvbglOo7XxdVm/c3LLyFtGT/RXw/OA9BoIy4aD7d91lQ2xX1t" crossorigin="anonymous">
	<link rel="modulepreload" href="sources/main.js">
</head>
<body>
	<section id="header-left" class="sticky">
		<div class="rsa-header">
			<div class="rsa-logo"><span>RSA</span></div>
			<div class="rsa-titles">
				<h1>Montador de Personagem</h1>
				<p>Monte seu avatar pixel e envie pro Escritório Virtual</p>
			</div>
			<span class="rsa-tag">RSABOX</span>
		</div>
	</section>

	<div id="columns-container" class="columns is-desktop">
		<div id="chooser-column" class="column">
			<div id="mithril-filters" class="loading"></div>
		</div>

		<div id="preview-column" class="column">
			<div id="mithril-preview" class="loading"></div>
			<div id="mithril-spritesheet-preview" class="loading"></div>
		</div>
	</div>
	<script type="module" src="sources/main.js"></script>
</body>
</html>
